services:
  - type: keyvalue
    name: newsweb-explain-redis
    plan: free
    ipAllowList: []
    maxmemoryPolicy: noeviction

  - type: web
    name: newsweb-explain-api
    runtime: docker
    dockerfilePath: ./apps/api/Dockerfile
    plan: starter
    preDeployCommand: npm run prisma:migrate:deploy
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: API_PORT
        value: 4000
      - key: DATABASE_URL
        fromDatabase:
          name: newsweb-explain-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: newsweb-explain-redis
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: DEV_AUTH_BYPASS
        value: false
      - key: MAGIC_LINK_BASE_URL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        value: noreply@example.com
      - key: ADMIN_API_KEY
        generateValue: true

  - type: worker
    name: newsweb-explain-worker
    runtime: docker
    dockerfilePath: ./apps/worker/Dockerfile
    plan: starter
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: newsweb-explain-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: newsweb-explain-redis
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_MODEL
        value: claude-sonnet-4-6
      - key: ANTHROPIC_TIMEOUT_MS
        value: 60000
      - key: POLL_INTERVAL_MS
        value: 20000
      - key: LATEST_BOOTSTRAP_COUNT
        value: 10

  - type: web
    name: newsweb-explain-web
    runtime: docker
    dockerfilePath: ./apps/web/Dockerfile
    plan: starter
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: API_HOSTPORT
        fromService:
          type: web
          name: newsweb-explain-api
          property: hostport
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_MODEL
        value: claude-sonnet-4-6

databases:
  - name: newsweb-explain-db
    databaseName: newsweb_explain
    user: newsweb
    plan: free
    postgresMajorVersion: "16"
    ipAllowList: []
