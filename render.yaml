services:
  - type: keyvalue
    name: newsweb-explain-redis
    plan: free
    ipAllowList: []
    maxmemoryPolicy: noeviction

  - type: web
    name: autoweb
    runtime: docker
    dockerfilePath: ./Dockerfile.render
    plan: starter
    preDeployCommand: npm run prisma:migrate:deploy
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_PORT
        value: 4000
      - key: API_BASE_URL
        value: http://127.0.0.1:4000
      - key: DATABASE_URL
        fromDatabase:
          name: newsweb-explain-db
          property: connectionString
      - key: GENERATION_LOG_DATABASE_URL
        fromDatabase:
          name: newsweb-explain-log-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: newsweb-explain-redis
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: DEV_AUTH_BYPASS
        value: false
      - key: LOGIN_USERNAME
        value: E24
      - key: LOGIN_PASSWORD
        sync: false
      - key: MAGIC_LINK_BASE_URL
        value: https://autoweb-f4dw.onrender.com/login
      - key: SMTP_HOST
        value: ""
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        value: ""
      - key: SMTP_PASS
        value: ""
      - key: SMTP_FROM
        value: noreply@example.com
      - key: ADMIN_API_KEY
        generateValue: true
      - key: LITELLM_API_KEY
        sync: false
      - key: LITELLM_BASE_URL
        sync: false
      - key: LITELLM_MODEL
        value: claude-sonnet-4-6
      - key: LITELLM_TIMEOUT_MS
        value: 60000
      - key: POLL_INTERVAL_MS
        value: 20000
      - key: LATEST_BOOTSTRAP_COUNT
        value: 10

databases:
  - name: newsweb-explain-db
    databaseName: newsweb_explain
    user: newsweb
    plan: free
    postgresMajorVersion: "16"
    ipAllowList: []
  - name: newsweb-explain-log-db
    databaseName: newsweb_generation_logs
    user: newsweblog
    plan: free
    postgresMajorVersion: "16"
    ipAllowList: []
