services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: newsweb_explain
      POSTGRES_USER: newsweb
      POSTGRES_PASSWORD: newsweb
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql://newsweb:newsweb@postgres:5432/newsweb_explain?schema=public
      REDIS_URL: redis://redis:6379
      API_PORT: 4000
    depends_on:
      - postgres
      - redis
    command: sh -c "npm run prisma:migrate:deploy && npm run start -w apps/api"

  worker:
    build:
      context: ..
      dockerfile: apps/worker/Dockerfile
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql://newsweb:newsweb@postgres:5432/newsweb_explain?schema=public
      REDIS_URL: redis://redis:6379
      POLL_INTERVAL_MS: 20000
    depends_on:
      - postgres
      - redis
      - api

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      API_BASE_URL: http://api:4000
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8080/api
    depends_on:
      - api

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - web
      - api
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

